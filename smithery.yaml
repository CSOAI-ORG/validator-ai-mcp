name: validator-ai-mcp
description: AI-powered validator ai MCP server for agents. Supports validate json,
  validate email, validate url. By MEOK AI Labs.
version: 1.0.0
tools:
- name: validate_json
  description: Validate JSON string, optionally against a JSON Schema. Schema as JSON
    string.
  parameters:
  - name: data
    type: string
    required: true
  - name: schema
    type: string
    required: false
- name: validate_email
  description: Validate email format, domain structure, and check for disposable addresses.
  parameters:
  - name: email
    type: string
    required: true
- name: validate_url
  description: Validate URL format, structure, and security characteristics.
  parameters:
  - name: url
    type: string
    required: true
- name: validate_data_quality
  description: 'Check a JSON dataset for quality issues: nulls, duplicates, type consistency,
    outliers. Pass data as JSON array of objects.'
  parameters:
  - name: data
    type: string
    required: true
- name: validate_api_response
  description: Validate an API response body and structure. Required fields as comma-separated
    string.
  parameters:
  - name: response_body
    type: string
    required: true
  - name: expected_status
    type: integer
    required: false
  - name: expected_content_type
    type: string
    required: false
  - name: required_fields
    type: string
    required: false
